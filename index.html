<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocean Depths AR Exhibit</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;800&display=swap');

    :root {
      --bg-dark: #050811;
      --panel-bg: #16181d;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: var(--bg-dark);
      /* Subtle dark gradient background */
      background: radial-gradient(circle at center, #0d1425 0%, #020408 100%);
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
      perspective: 1200px;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1;
    }

    /* Main Container - Side by Side Layout */
    .exhibit-card {
      display: flex;
      flex-direction: row; /* Puts items side-by-side */
      align-items: center;
      justify-content: center;
      gap: 50px; /* Space between the image and the QR panel */
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
      cursor: crosshair;
      padding: 20px;
    }

    /* ========================================= */
    /* LEFT SIDE: Artwork Frame                  */
    /* ========================================= */
    .artwork-frame {
      position: relative;
      width: 340px;
      height: 520px;
      /* Simulates the metallic border structure */
      background: linear-gradient(135deg, #2a303c 0%, #0d1117 100%);
      padding: 16px;
      border-radius: 8px;
      box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.8),
        inset 0 2px 4px rgba(255, 255, 255, 0.2),
        inset 0 -2px 4px rgba(0, 0, 0, 0.8);
      transform: translateZ(40px); /* Pops out in 3D space */
      z-index: 2;
    }

    /* Inner groove of the frame */
    .artwork-inner {
      width: 100%;
      height: 100%;
      background-color: #000;
      border: 2px solid #000;
      box-shadow: inset 0 5px 15px rgba(0,0,0,0.9);
      position: relative;
      overflow: hidden;
    }

    /* The actual image */
    .artwork-inner::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url('octopus.jpg'); /* Make sure octopus.jpg is in the same folder */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: transform 0.3s ease;
    }

    /* ========================================= */
    /* RIGHT SIDE: QR Code & Text Panel          */
    /* ========================================= */
    .info-panel {
      width: 280px;
      background: var(--panel-bg);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
      transform: translateZ(60px); /* Pops out even further */
      z-index: 3;
    }

    .info-title {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 25px;
      letter-spacing: 0.5px;
      text-align: center;
    }

    /* QR Code Image Wrapper */
    .qr-image-wrapper {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 25px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    .qr-image-wrapper:hover {
      transform: scale(1.05);
      box-shadow: 0 15px 25px rgba(0, 238, 255, 0.2);
    }

    .qr-image-wrapper img {
      width: 140px;
      height: 140px;
      display: block;
      object-fit: contain;
    }

    .info-subtitle {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-align: center;
      line-height: 1.5;
    }

    /* Responsive Design: Stack vertically on small screens */
    @media (max-width: 800px) {
      .exhibit-card {
        flex-direction: column;
        gap: 30px;
      }
      .artwork-frame {
        width: 300px;
        height: 450px;
      }
    }
  </style>
</head>
<body>

  <div class="scene">
    <div class="exhibit-card" id="interactivePoster">
      
      <div class="artwork-frame">
        <div class="artwork-inner"></div>
      </div>

      <div class="info-panel">
        <div class="info-title">Art Drawing</div>
        
        <div class="qr-image-wrapper" onclick="window.open('https://www.kivicube.com/scenes/doZXuz6ix5X5NlOJxxF1DGkmBHmWEpIx', '_blank')">
          <img src="qr.png" alt="Scan to view AR Experience"> </div>
        
        <div class="info-subtitle">Scan to experience on a mobile device<br><br><span style="font-size: 10px; opacity: 0.6; text-transform: uppercase;">Ocean Depths AR Exhibit</span></div>
      </div>

    </div>
  </div>

  <script>
    const poster = document.getElementById('interactivePoster');
    const scene = document.querySelector('.scene');

    // 3D Parallax Mouse Tracking
    scene.addEventListener('mousemove', (e) => {
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      
      // Calculate rotation based on distance from center
      const rotateX = ((centerY - e.clientY) / 40).toFixed(2);
      const rotateY = ((e.clientX - centerX) / 40).toFixed(2);

      poster.style.transform = `perspective(1200px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    // Smooth reset when mouse leaves the window
    scene.addEventListener('mouseleave', () => {
      poster.style.transition = 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
      poster.style.transform = `perspective(1200px) rotateX(0deg) rotateY(0deg)`;
      
      setTimeout(() => {
        poster.style.transition = 'transform 0.1s ease-out';
      }, 600);
    });
  </script>

</body>
</html>
